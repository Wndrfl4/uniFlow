spring:
  application:
    name: uniflow-blog

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/uniflow}
    username: ${DB_USERNAME:uniflow}
    password: ${DB_PASSWORD:uniflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: uniflow-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.uniflow.blog.*"

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  ai:
    provider: ${AI_PROVIDER:mock}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-flash}
      base-url: https://generativelanguage.googleapis.com
    groq:
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:llama-3.3-70b-versatile}
      base-url: https://api.groq.com
    openrouter:
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:meta-llama/llama-3.2-3b-instruct:free}
      base-url: https://openrouter.ai
      site-url: ${SITE_URL:http://localhost:8080}
      site-name: UniFlow Blog
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  security:
    max-login-attempts: ${MAX_LOGIN_ATTEMPTS:5}
    lock-duration-minutes: ${LOCK_DURATION_MINUTES:15}
    rate-limit-requests: ${RATE_LIMIT_REQUESTS:20}
    rate-limit-window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

logging:
  level:
    com.uniflow.blog: DEBUG
    org.springframework.security: INFO
